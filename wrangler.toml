name = "email-ai-executor"
main = "worker.js"
compatibility_date = "2025-04-28"
compatibility_flags = ["nodejs_compat"]

[observability]
  [observability.logs]
  enabled = true
  head_sampling_rate = 1
  invocation_logs = true
  persist = true

[vars]
# AI provider: Anthropic is tried first; if it fails, OpenAI is the fallback.
# Set at least one key as a Worker secret (wrangler secret put ANTHROPIC_API_KEY).
ANTHROPIC_MODEL = "claude-sonnet-4-6"
OPENAI_MODEL = "gpt-5.2"
OPENAI_BASE_URL = "https://api.openai.com"
OPENAI_ENABLE_WEB_SEARCH = "true"

# Shared
MAX_OUTPUT_TOKENS = "1024"
TIMEOUT_MS = "30000"
SYSTEM_PROMPT = "You are an assistant that drafts concise, polite, and professional email replies. Keep responses brief and actionable."

# Optional domain filters (comma-separated)
# ALLOW_DOMAINS = "example.com,another.com"
# BLOCK_DOMAINS = "noreply.com"
